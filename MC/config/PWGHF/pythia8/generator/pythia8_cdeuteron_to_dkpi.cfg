### processes
SoftQCD:inelastic on		# all inelastic processes

### decays
ParticleDecays:limitTau0 on	
ParticleDecays:tau0Max 10.

### add the c-deuteron
### id:all = name antiName spinType chargeType colType m0 mWidth mMin mMax tau0
2010010020:all = CDeuteron AntiCDeuteron 1 3 0 3.226 0 3.226 3.226 0.5
2010010020:mayDecay = on

# same as Λc+ -> p K- π+ including resonances + a neutron
2010010020:oneChannel = 1 0.14400 0 2112 2212 -321 211       ### cd+ -> n p K- π+ (non-resonant) 3.5%
2010010020:addChannel = 1 0.08100 100 2112 2212 -313         ### cd+ -> n p K*0(892) 1.96%
2010010020:addChannel = 1 0.04500 100 2112 2224 -321         ### cd+ -> n Delta++ K- 1.08%
2010010020:addChannel = 1 0.09000 100 2112 102134 211        ### cd+ -> n Lambda(1520) K- 2.20e-3

